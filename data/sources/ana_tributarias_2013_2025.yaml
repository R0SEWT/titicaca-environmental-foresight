notes: >
  DATASET PRINCIPAL para el modelo. Tiene estructura relacional en dos hojas:
  1_monitoreo (nivel campaña) y 2_calidad_agua (nivel punto×campaña). El flag
  excede_eca ya está calculado. Ver también ana_calidad_agua_v2 para versión con
  detalle adicional de parámetros que exceden ECA.
