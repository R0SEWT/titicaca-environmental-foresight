granularity: "1 fila por punto de muestreo × campaña de monitoreo"
n_records_approx: "~300 puntos en 19 campañas (2013–2025); incluye regulares + emergencia"
schema_confirmed: true

collection_method: >
  Monitoreo fisicoquímico in situ (pH-metro, oxímetro, conductímetro, termómetro) +
  toma de muestras para análisis de metales pesados y microbiológicos en laboratorio
  SGS del Perú. Coordenadas UTM WGS84 registradas en campo. Informes individuales por
  campaña emitidos como IT (Informe Técnico) numerados por la AAA.TIT.
laboratory: "SGS del Perú S.A.C."
standard: "ECA para agua: Categoría 3 (riego/bebida animal) y Categoría 4-E1 (conservación del ambiente acuático — lagos)"

limitations:
  - "Monitoreos puntuales (campaña de días a semanas), no series temporales continuas"
  - "Cobertura temporal desigual por cuenca: Suches solo 2013, otras cuencas con mayor densidad 2023–2025"
  - "Mezcla de campañas regulares (estiaje/avenida) y de emergencia (denuncias mineras); deben separarse en análisis"
  - "Sin cobertura de cuencas bolivianas (Katari, Desaguadero)"
  - "No incluye clorofila-a, Disco Secchi ni parámetros ópticos del lago principal"
  - "Algunos puntos sin coordenadas o sin caudal registrado (marcados 'sin caudal')"
  - "El campo nivel_lago_titicaca_msnm solo aparece en campañas recientes (Coata 2025)"

citation: >
  ANA-AAA.TIT/RWAA. Informes Técnicos de Monitoreo de Calidad de Agua, Cuencas
  Tributarias del Sistema Titicaca, 2013–2025. Autoridad Nacional del Agua, Perú.
  Dataset consolidado proporcionado por equipo periodístico El Comercio.
