schema_confirmed: true

collection_method: >
  Registros de mortalidad MINSA/DIRESA Puno. La tabla neonatal proviene de una solicitud de
  acceso a la información pública (SAIP 25-004785) y fue limpiada por el equipo partner (creador
  openpyxl, sufijo _limpia) → es derivado, no crudo original.
laboratory: null
standard: null

limitations:
  - "Mortalidad materna a nivel departamental (sin desagregación distrital en la serie anual) → poca resolución espacial para cruce con zonas de contaminación"
  - "Neonatal: archivo derivado (limpiado por partner); conservar trazabilidad al SAIP original"
  - "Vínculo con contaminación del agua indirecto/débil; útil como contexto de salud materno-infantil"

citation: "MINSA — DIRESA Puno. Mortalidad materna 2000–2025 y neonatal (SAIP 25-004785)."
